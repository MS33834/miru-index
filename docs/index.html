        width: 40%;

      }
      @keyframes loader-pulse {

          opacity: 1;
        }
        50% {

        }
      }
      @keyframes loader-flow {
        0% {
          transform: translateX(-150%);
        }
        100% {
          transform: translateX(350%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-loader__seal,
        .app-loader__ink::after {
