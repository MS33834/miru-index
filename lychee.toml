# Lychee 链接检查配置
# 目标：拦截真正的死链，同时不对临时网络波动、反爬策略或未部署站点过度敏感

# 超时与重试
timeout = 30
max_retries = 2

# 扫描范围
include = ["."]
exclude = [
  # 构建产物与依赖目录
  "docs/assets/*",
  "miru-app/node_modules/*",
  # 说明文档中的外部资源链接由单独任务维护，不阻塞 CI
  "README.md",
  "LINKS.md",
  "SITES.md",
  "CONTRIBUTING.md",
  "docs/README.md",
  "docs/TROUBLESHOOTING.md",
  # 站点尚未部署到 GitHub Pages，排除该域名避免误报
  ".*ms33834\\.github\\.io.*",
]

# 根相对链接解析基准
base_url = "https://MS33834.github.io/miru-index/"

# 接受的 HTTP 状态码：403/502/503 常为 CDN/防火墙/临时维护，不视为死链
accept = [200, 204, 301, 302, 303, 307, 308, 403, 502, 503]

# 不检查邮件地址
include_mail = false

# 不检查本地回环
exclude_loopback = true
