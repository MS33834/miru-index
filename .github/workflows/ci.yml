name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: miru-app/package-lock.json

      - name: Install dependencies
        working-directory: miru-app
        run: npm ci

      - name: Build
        working-directory: miru-app
        run: npm run build

      - name: Check docs output exists
        run: test -f docs/index.html && test -d docs/assets

  e2e:
    name: End-to-end tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: miru-app/package-lock.json

      - name: Install dependencies
        working-directory: miru-app
        run: npm ci

      - name: Install Playwright browsers
        working-directory: miru-app
        run: npx playwright install --with-deps firefox

      - name: Run E2E tests
        working-directory: miru-app
        run: npm run test:e2e
