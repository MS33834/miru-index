name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: miru-app/package-lock.json

      - name: Install dependencies
        working-directory: miru-app
        run: npm ci

      - name: Audit data integrity
        working-directory: miru-app
        run: npm run audit

      - name: Lint
        working-directory: miru-app
        run: npm run lint

      - name: Check formatting
        working-directory: miru-app
        run: npm run format:check

      - name: Run unit tests
        working-directory: miru-app
        run: npm test

      - name: Build
        working-directory: miru-app
        run: npm run build

      - name: Check docs output exists
        run: test -f docs/index.html && test -d docs/assets

  e2e:
    name: End-to-end tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: miru-app/package-lock.json

      - name: Install dependencies
        working-directory: miru-app
        run: npm ci

      - name: Build (e2e 必须测试当前源码产物，而非仓库里已提交的旧 docs/)
        working-directory: miru-app
        run: npm run build

      - name: Install Playwright browsers
        working-directory: miru-app
        # 与 playwright.config.js 的 chromium / firefox / Mobile Chrome 三个 project 对齐
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E
        working-directory: miru-app
        # 不再手动起 vite preview：由 playwright.config.js 的 webServer 统一管理，
        # 避免与 webServer 重复占用 4173 端口导致 EADDRINUSE
        run: npx playwright test
