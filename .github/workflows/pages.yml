name: Deploy static site to Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: miru-app/package-lock.json

      - name: Install dependencies
        working-directory: miru-app
        run: npm ci

      - name: Build
        working-directory: miru-app
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@f4f390bfc614f260b3ce76e0b4d356298057e9a0 # v3.0.1
        with:
          path: docs

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@854d7aa1b99e7d717adffc8c79f5b13e9c8d6b70 # v4.0.5
