name: Deploy static site to Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: miru-app/package-lock.json

      - name: Install dependencies
        working-directory: miru-app
        run: npm ci

      - name: Audit data integrity
        working-directory: miru-app
        run: npm run audit

      - name: Validate data schema
        working-directory: miru-app
        run: npm run validate

      - name: Lint
        working-directory: miru-app
        run: npm run lint

      - name: Run unit tests
        working-directory: miru-app
        run: npm test

      - name: Build
        working-directory: miru-app
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5 # v3.0.1
        with:
          path: docs

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5 # v4.0.5
